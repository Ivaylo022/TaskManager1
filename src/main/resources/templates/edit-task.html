<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Task</title>
</head>
<body>

<h1>Edit Task</h1>

<form th:action="@{'/tasks/edit/' + ${task.id}}"
      th:object="${task}"
      method="post">

    <input type="text"
           th:field="*{title}"
           placeholder="Title">

    <div style="color:red"
         th:if="${#fields.hasErrors('title')}"
         th:errors="*{title}">
    </div>

    <br>

    <input type="text"
           th:field="*{description}"
           placeholder="Description">

    <div style="color:red"
         th:if="${#fields.hasErrors('description')}"
         th:errors="*{description}">
    </div>

    <br>

    <input type="text"
           th:field="*{status}"
           placeholder="Status">

    <br><br>

    <button type="submit">
        Save
    </button>

</form>

</body>
</html>
