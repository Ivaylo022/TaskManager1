<!DOCTYPE html>
<html>
<head>
    <title>Add Task</title>
</head>
<body>

<h1>Add Task</h1>

<form action="/tasks" method="post">

    <input type="text"
           name="title"
           placeholder="Title">

    <br><br>

    <input type="text"
           name="description"
           placeholder="Description">

    <br><br>

    <input type="text"
           name="status"
           placeholder="Status">

    <br><br>

    <button type="submit">Add</button>

</form>

</body>
</html>
