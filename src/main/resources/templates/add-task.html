<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Task</title>
</head>
<body>

<h1>Add Task</h1>

<form th:action="@{/tasks}"
      th:object="${task}"
      method="post">

    <input type="text"
           th:field="*{title}"
           placeholder="Title">

    <div style="color:red"
         th:if="${#fields.hasErrors('title')}"
         th:errors="*{title}">
    </div>

    <br><br>

    <input type="text"
           name="description"
           placeholder="Description">

    <div style="color:red"
         th:if="${#fields.hasErrors('description')}"
         th:errors="*{description}">
    </div>

    <br><br>

    <input type="text"
           name="status"
           placeholder="Status">

    <br><br>

    <button type="submit">Add</button>

</form>

</body>
</html>
