<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tasks</title>
</head>
<body>

<h1>Tasks</h1>

<form action="/logout" method="post">
    <button type="submit">Logout</button>
</form>

<br>

<a href="/add-task">Add Task</a>

<hr>

<div th:each="task : ${tasks}">

    <h3 th:text="${task.title}"></h3>

    <p th:text="${task.description}"></p>

    <p th:text="${task.status}"></p>

    <form th:action="@{'/tasks/delete/' + ${task.id}}" method="post">
        <button type="submit">Delete</button>
    </form>

    <form th:action="@{'/tasks/done/' + ${task.id}}" method="post">
        <button type="submit">Mark Done</button>
    </form>

    <form th:action="@{'/edit-task/' + ${task.id}}" method="get">
        <button type="submit">Edit</button>
    </form>

    <hr>

</div>

</body>
</html>
