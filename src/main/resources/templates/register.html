<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
</head>
<body>

<h1>Register</h1>

<form th:action="@{/register}"
      th:object="${user}"
      method="post">

    <input type="text"
           th:field="*{username}"
           placeholder="Username">

    <br><br>

    <input type="password"
           th:field="*{password}"
           placeholder="Password">

    <br><br>

    <button type="submit">
        Register
    </button>

</form>

</body>
</html>
